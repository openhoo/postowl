name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14
  HOOVERSION_SHA: 799ecf4a9c29e8ce4d5ad7055a6030adf665cf82 # v0.2.0

jobs:
  commitlint:
    name: Conventional Commits
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Hooversion
        run: |
          set -euo pipefail
          install_dir="$(mktemp -d "$RUNNER_TEMP/hooversion.XXXXXXXX")"
          echo "HOOVERSION_DIR=$install_dir" >> "$GITHUB_ENV"
          git init "$install_dir"
          git -C "$install_dir" fetch --depth 1 https://github.com/openhoo/hooversion.git "$HOOVERSION_SHA"
          git -C "$install_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$install_dir" rev-parse HEAD)" = "$HOOVERSION_SHA"
          cd "$install_dir"
          bun install --frozen-lockfile

      - name: Lint commits
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun "$HOOVERSION_DIR/src/cli.ts" lint \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}"
          else
            bun "$HOOVERSION_DIR/src/cli.ts" lint --last
          fi

      - name: Remove Hooversion checkout
        if: always()
        run: test -z "${HOOVERSION_DIR:-}" || rm -rf "$HOOVERSION_DIR"

  verify:
    name: Linux verification
    needs: commitlint
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.88.0
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            xvfb

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend
        run: pnpm check

      - name: Build frontend
        run: pnpm build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build native end-to-end binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --features e2e,tauri/custom-protocol

      - name: Test native end-to-end workflows
        env:
          POSTOWL_DATA_DIR: ${{ runner.temp }}/postowl-e2e
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: xvfb-run --auto-servernum pnpm test:e2e

      - name: Check version synchronization
        run: node scripts/sync-version.ts --check
