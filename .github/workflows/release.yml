name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview Hooversion without commits, tags, releases, or native builds
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.14
  HOOVERSION_SHA: 799ecf4a9c29e8ce4d5ad7055a6030adf665cf82 # v0.2.0

jobs:
  release:
    name: Hooversion release
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.dry_run) ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      commit: ${{ steps.release_commit.outputs.commit }}
      current: ${{ steps.current.outputs.current || steps.manual_current.outputs.current }}
      published: ${{ steps.release.outputs.published }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: main

      - name: Verify release run matches current main
        id: current
        if: github.event_name == 'workflow_run'
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          if [ "$actual" = "$EXPECTED_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping stale release run for $EXPECTED_SHA because main is $actual."
          fi

      - name: Mark manual run current
        id: manual_current
        if: github.event_name == 'workflow_dispatch'
        run: echo "current=true" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Hooversion
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        run: |
          set -euo pipefail
          install_dir="$(mktemp -d "$RUNNER_TEMP/hooversion.XXXXXXXX")"
          echo "HOOVERSION_DIR=$install_dir" >> "$GITHUB_ENV"
          git init "$install_dir"
          git -C "$install_dir" fetch --depth 1 https://github.com/openhoo/hooversion.git "$HOOVERSION_SHA"
          git -C "$install_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$install_dir" rev-parse HEAD)" = "$HOOVERSION_SHA"
          cd "$install_dir"
          bun install --frozen-lockfile

      - name: Configure release author
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        id: release
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          args=(release)
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          bun "$HOOVERSION_DIR/src/cli.ts" "${args[@]}"

      - name: Resolve immutable release commit
        id: release_commit
        if: steps.release.outputs.published == 'true'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Remove Hooversion checkout
        if: always()
        run: test -z "${HOOVERSION_DIR:-}" || rm -rf "$HOOVERSION_DIR"

  native:
    name: Native bundle (${{ matrix.label }})
    needs: release
    if: needs.release.outputs.current == 'true' && needs.release.outputs.published == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux
          - platform: windows-latest
            label: windows
          - platform: macos-latest
            label: macos
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag }}

      - name: Verify release tag commit
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.release.outputs.commit }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.88.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.label }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload native bundles
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.release.outputs.tag }}

      - name: Generate and upload checksums
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          checksum_file="$PWD/${RELEASE_TAG}-${{ matrix.label }}-SHA256SUMS.txt"
          assets_dir="$(mktemp -d)"
          trap 'rm -rf "$assets_dir"' EXIT

          case "${{ matrix.label }}" in
            linux) asset_patterns=('*.AppImage' '*.deb' '*.rpm') ;;
            windows) asset_patterns=('*.exe' '*.msi') ;;
            macos) asset_patterns=('*.dmg') ;;
            *) echo "Unsupported release platform: ${{ matrix.label }}" >&2; exit 1 ;;
          esac

          download_args=()
          for pattern in "${asset_patterns[@]}"; do
            download_args+=(--pattern "$pattern")
          done
          gh release download "$RELEASE_TAG" --dir "$assets_dir" "${download_args[@]}"

          (
            cd "$assets_dir"
            export LC_ALL=C
            shopt -s nullglob
            assets=(*)
            ((${#assets[@]} > 0)) || {
              echo "No published installer assets found for ${{ matrix.label }}" >&2
              exit 1
            }
            for asset in "${assets[@]}"; do
              if command -v sha256sum >/dev/null 2>&1; then
                sha256sum -- "$asset"
              else
                shasum -a 256 -- "$asset"
              fi
            done
          ) > "$checksum_file"
          test -s "$checksum_file"
          gh release upload "$RELEASE_TAG" "$checksum_file" --clobber
